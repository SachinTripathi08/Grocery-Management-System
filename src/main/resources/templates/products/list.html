<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Products')}"></head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <div class="col-md-2">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10 content">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Products</h2>
                    <a th:href="@{/products/add}" class="btn btn-primary">Add Product</a>
                </div>
                <hr>
                <div th:if="${successMessage}" class="alert alert-success mt-2" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger mt-2" th:text="${errorMessage}"></div>
                <table class="table table-striped table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>S.No.</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>MRP</th>
                            <th>Sell Price</th>
                            <th>Discount</th>
                            <th>Final Price</th>
                            <th>Stock</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p, stat : ${products}">
                            <td th:text="${stat.count}"></td>
                            <td th:text="${p.name}"></td>
                            <td th:text="${p.category.name}"></td>
                            <td th:text="${#numbers.formatDecimal(p.mrp, 1, 2)}"></td>
                            <td th:text="${#numbers.formatDecimal(p.sellingPrice, 1, 2)}"></td>
                            <td th:text="${#numbers.formatDecimal(p.discount, 1, 2)} + '%'"></td>
                            <td class="table-success fw-bold" th:text="${#numbers.formatDecimal(p.finalPrice, 1, 2)}"></td>
                            <td th:classappend="${p.quantity < 5} ? 'table-danger fw-bold' : ''" th:text="${p.quantity}"></td>
                            <td>
                                <a th:href="@{'/products/delete/' + ${p.id}}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="9" class="text-center">No products found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
