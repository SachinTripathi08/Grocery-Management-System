<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <div class="col-md-2">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10 content">
                <h2>Dashboard</h2>
                <hr>
                <div class="row">
                    <div class="col-md-4">
                        <div class="card text-white bg-primary mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Total Sales</h5>
                                <h3>$<span th:text="${#numbers.formatDecimal(totalSales, 1, 'COMMA', 2, 'POINT')}">0.00</span></h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-success mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Total Profit</h5>
                                <h3>$<span th:text="${#numbers.formatDecimal(totalProfit, 1, 'COMMA', 2, 'POINT')}">0.00</span></h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-info mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Total Bills Generated</h5>
                                <h3 th:text="${totalBills}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
