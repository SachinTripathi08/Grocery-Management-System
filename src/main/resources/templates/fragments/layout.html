<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' - Grocery System'">Grocery System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; padding-top: 20px;}
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover { color: white; background-color: #495057; }
        .content { padding: 20px; }
        .navbar-brand { font-weight: bold; }
    </style>
</head>
<body>

<div th:fragment="sidebar">
    <div class="sidebar">
        <h4 class="text-center mb-4">Grocery System</h4>
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/categories}">Categories</a>
        <a th:href="@{/products}">Products</a>
        <a th:href="@{/customers}">Customers</a>
        <a th:href="@{/bills}">Billing</a>
        <hr class="border-secondary">
        <form th:action="@{/logout}" method="post" class="px-3">
            <button type="submit" class="btn btn-outline-light w-100 mt-2">Logout</button>
        </form>
    </div>
</div>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>

</body>
</html>
