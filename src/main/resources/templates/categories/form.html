<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Add Category')}"></head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <div class="col-md-2">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10 content">
                <h2 th:text="${category.id != null ? 'Edit Category' : 'Add Category'}">Add Category</h2>
                <hr>
                <div class="card" style="max-width: 600px;">
                    <div class="card-body">
                        <form th:action="@{/categories/save}" th:object="${category}" method="post">
                            <input type="hidden" th:field="*{id}">
                            <div class="mb-3">
                                <label for="name" class="form-label">Category Name</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" required>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-success">Save</button>
                            <a th:href="@{/categories}" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
