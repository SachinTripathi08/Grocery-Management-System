<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categories')}"></head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <div class="col-md-2">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10 content">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Categories</h2>
                    <a th:href="@{/categories/add}" class="btn btn-primary">Add Category</a>
                </div>
                <hr>
                <div th:if="${successMessage}" class="alert alert-success mt-2" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger mt-2" th:text="${errorMessage}"></div>
                <table class="table table-striped table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>S.No.</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat, stat : ${categories}">
                            <td th:text="${stat.count}"></td>
                            <td th:text="${cat.name}"></td>
                            <td th:text="${cat.description}"></td>
                            <td>
                                <a th:href="@{'/categories/edit/' + ${cat.id}}" class="btn btn-sm btn-warning">Edit</a>
                                <a th:href="@{'/categories/delete/' + ${cat.id}}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this category?')">Delete</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="4" class="text-center">No categories found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
